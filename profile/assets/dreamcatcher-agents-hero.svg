<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Dreamcatcher Agents</title>
<desc id="desc">Dark professional banner showing a network of five AI agent personas connected to deployment channels.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
    <stop stop-color="#020617"/>
    <stop offset="0.48" stop-color="#0f172a"/>
    <stop offset="1" stop-color="#111827"/>
  </linearGradient>
  <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(910 90) rotate(115) scale(420 360)">
    <stop stop-color="#22d3ee" stop-opacity="0.38"/>
    <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 260) rotate(35) scale(380 300)">
    <stop stop-color="#a78bfa" stop-opacity="0.32"/>
    <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.55" opacity="0.45"/>
  </pattern>
</defs>
<rect width="1200" height="360" rx="32" fill="url(#bg)"/>
<rect width="1200" height="360" rx="32" fill="url(#grid)" opacity="0.55"/>
<rect width="1200" height="360" rx="32" fill="url(#glow1)"/>
<rect width="1200" height="360" rx="32" fill="url(#glow2)"/>

<g transform="translate(80 66)">
  <rect x="0" y="0" width="92" height="92" rx="26" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="46" cy="46" r="31" stroke="#22d3ee" stroke-width="2" opacity="0.86"/>
  <circle cx="46" cy="46" r="20" stroke="#a78bfa" stroke-width="2" opacity="0.72"/>
  <path d="M46 16 L55 41 L82 41 L60 56 L68 82 L46 66 L24 82 L32 56 L10 41 L37 41 Z" fill="#22d3ee" opacity="0.14"/>
  <circle cx="46" cy="46" r="5" fill="#f8fafc"/>
</g>

<text x="196" y="102" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5">Dreamcatcher Agents</text>
<text x="200" y="145" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500">Transparent AI personas, reusable identity kits, and deployment-ready agent specs.</text>

<g transform="translate(200 190)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="700">
  <rect x="0" y="0" width="156" height="42" rx="21" fill="#082f49" stroke="#22d3ee" stroke-opacity="0.55"/>
  <circle cx="23" cy="21" r="6" fill="#22d3ee"/>
  <text x="40" y="26" fill="#e0f2fe">5 personas</text>
  <rect x="176" y="0" width="205" height="42" rx="21" fill="#064e3b" stroke="#34d399" stroke-opacity="0.55"/>
  <circle cx="199" cy="21" r="6" fill="#34d399"/>
  <text x="216" y="26" fill="#d1fae5">multi-channel assets</text>
  <rect x="402" y="0" width="198" height="42" rx="21" fill="#312e81" stroke="#a78bfa" stroke-opacity="0.55"/>
  <circle cx="425" cy="21" r="6" fill="#a78bfa"/>
  <text x="442" y="26" fill="#ede9fe">auditable specs</text>
</g>

<g transform="translate(690 78)" filter="url(#shadow)">
  <path d="M154 78 L232 32 L314 82 L286 176 L194 188 Z" stroke="#475569" stroke-width="2" fill="#0f172a" opacity="0.88"/>
  <path d="M154 78 L314 82 M232 32 L286 176 M194 188 L232 32" stroke="#334155" stroke-width="1.4" opacity="0.95"/>
  <g font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800" text-anchor="middle">
    <circle cx="154" cy="78" r="38" fill="#082f49" stroke="#22d3ee" stroke-width="2"/><text x="154" y="83" fill="#e0f2fe">OPS</text>
    <circle cx="232" cy="32" r="38" fill="#064e3b" stroke="#34d399" stroke-width="2"/><text x="232" y="37" fill="#d1fae5">TECH</text>
    <circle cx="314" cy="82" r="38" fill="#312e81" stroke="#a78bfa" stroke-width="2"/><text x="314" y="87" fill="#ede9fe">STRAT</text>
    <circle cx="286" cy="176" r="38" fill="#831843" stroke="#f472b6" stroke-width="2"/><text x="286" y="181" fill="#fce7f3">CARE</text>
    <circle cx="194" cy="188" r="38" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/><text x="194" y="193" fill="#dbeafe">SALES</text>
  </g>
</g>

<text x="80" y="318" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">fictional AI-agent personas · explicit disclosure · GitHub / Telegram / WhatsApp / email-ready assets</text>
</svg>
